<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="1000" height="760" fill="#0f172a"/>

  <text x="500" y="40" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="bold">AI-Powered SOC Dashboard — Architecture</text>

  <!-- Layer 1: EC2 -->
  <rect x="60" y="80" width="260" height="90" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="190" y="110" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">EC2 victim-server</text>
  <text x="190" y="130" text-anchor="middle" fill="#94a3b8" font-size="12">Ubuntu 24.04 · AWS ap-south-1</text>
  <text x="190" y="148" text-anchor="middle" fill="#94a3b8" font-size="12">auth.log + audit.log (auditd)</text>

  <!-- Layer 1b: Forwarder -->
  <rect x="380" y="80" width="260" height="90" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="510" y="110" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">Universal Forwarder</text>
  <text x="510" y="130" text-anchor="middle" fill="#94a3b8" font-size="12">Monitors auth.log / audit.log</text>
  <text x="510" y="148" text-anchor="middle" fill="#94a3b8" font-size="12">Forwards → localhost:9997</text>

  <line x1="320" y1="125" x2="380" y2="125" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Reverse tunnel -->
  <rect x="60" y="210" width="580" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="350" y="238" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">Reverse SSH Tunnel (initiated from Splunk VM → EC2)</text>
  <text x="350" y="258" text-anchor="middle" fill="#94a3b8" font-size="12">Bridges home network (no inbound access) to public EC2 host</text>

  <line x1="510" y1="170" x2="510" y2="188" stroke="#4a5568" stroke-width="2"/>
  <line x1="510" y1="188" x2="350" y2="188" stroke="#4a5568" stroke-width="2"/>
  <line x1="350" y1="188" x2="350" y2="210" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Splunk -->
  <rect x="60" y="330" width="580" height="100" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="350" y="362" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">Splunk Enterprise (VirtualBox VM, local)</text>
  <text x="350" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">Receives on port 9997 · Indexes logs · Web UI :8000</text>
  <text x="350" y="404" text-anchor="middle" fill="#94a3b8" font-size="12">3 MITRE-mapped detection rules, scheduled every 5 min</text>

  <line x1="350" y1="280" x2="350" y2="330" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MITRE row -->
  <rect x="60" y="460" width="180" height="60" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="150" y="484" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">T1110</text>
  <text x="150" y="502" text-anchor="middle" fill="#94a3b8" font-size="11">Brute Force</text>

  <rect x="270" y="460" width="180" height="60" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="360" y="484" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">T1078</text>
  <text x="360" y="502" text-anchor="middle" fill="#94a3b8" font-size="11">Valid Accounts</text>

  <rect x="480" y="460" width="180" height="60" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="570" y="484" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">T1059</text>
  <text x="570" y="502" text-anchor="middle" fill="#94a3b8" font-size="11">Command Execution</text>

  <line x1="150" y1="430" x2="150" y2="460" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="430" x2="360" y2="460" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="430" x2="570" y2="460" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Python triage -->
  <rect x="60" y="560" width="600" height="140" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="360" y="590" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">Python Triage Layer (/triage)</text>
  <text x="360" y="614" text-anchor="middle" fill="#94a3b8" font-size="12">fetch_alerts.py → enrich.py → summarize.py → main.py</text>
  <text x="360" y="634" text-anchor="middle" fill="#94a3b8" font-size="12">Splunk REST API → severity scoring → correlated narrative</text>
  <text x="360" y="654" text-anchor="middle" fill="#94a3b8" font-size="12">Dockerized · CI-linted · runs on demand or --watch</text>
  <text x="360" y="678" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">Mapped to ISO 27001:2022 &amp; NIST SP 800-53 Rev 5 controls</text>

  <line x1="150" y1="520" x2="150" y2="540" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="360" y1="520" x2="360" y2="540" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="570" y1="520" x2="570" y2="540" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="150" y1="540" x2="570" y2="540" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="360" y1="540" x2="360" y2="560" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Right side: unrelated VMs note -->
  <rect x="700" y="330" width="240" height="100" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="820" y="356" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">Same VirtualBox host, unrelated:</text>
  <text x="820" y="378" text-anchor="middle" fill="#64748b" font-size="11">kali-linux-2026.1</text>
  <text x="820" y="396" text-anchor="middle" fill="#64748b" font-size="11">wazuh-server</text>
  <text x="820" y="414" text-anchor="middle" fill="#64748b" font-size="11">(not part of this project)</text>

  <text x="500" y="740" text-anchor="middle" fill="#475569" font-size="11">Mustafa Muhammad Iqbal — ai-powered-soc-dashboard</text>
</svg>
