name: Triage Layer CI

on:
  push:
    branches: [main]
    paths:
      - "triage/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "triage/**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: triage

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --extend-ignore=E203

      - name: Build Docker image
        run: docker build -t soc-triage:ci .
